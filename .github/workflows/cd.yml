# Fungsi file: Mendefinisikan pipeline CD untuk build dan push image container.
name: CD - Build & Push Images

on:
  workflow_run:
    workflows: ["CI - Build & Test"]
    types: [completed]
    branches: [dev, prod]
  workflow_dispatch:
    inputs:
      target_branch:
        description: Branch sumber image
        required: true
        type: choice
        options:
          - dev
          - prod

env:
  REGISTRY: ghcr.io
  API_IMAGE: ghcr.io/marcellohugo/cashflowpoly-analytics-platform/api
  UI_IMAGE: ghcr.io/marcellohugo/cashflowpoly-analytics-platform/ui

jobs:
  docker-build:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' &&
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      (github.event.workflow_run.head_branch == 'dev' ||
      github.event.workflow_run.head_branch == 'prod'))

    permissions:
      contents: read
      packages: write

    steps:
      - name: Resolve source ref
        id: meta
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            echo "checkout_ref=${{ github.event.workflow_run.head_sha }}" >> "$GITHUB_OUTPUT"
            echo "branch_name=${{ github.event.workflow_run.head_branch }}" >> "$GITHUB_OUTPUT"
          else
            echo "checkout_ref=${{ inputs.target_branch }}" >> "$GITHUB_OUTPUT"
            echo "branch_name=${{ inputs.target_branch }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.meta.outputs.checkout_ref }}

      - name: Resolve image tag
        id: image
        shell: bash
        run: |
          echo "image_tag=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Resolve publish tags
        id: tags
        shell: bash
        run: |
          branch_name="${{ steps.meta.outputs.branch_name }}"

          if [ "$branch_name" = "prod" ]; then
            echo "api_tags<<EOF" >> "$GITHUB_OUTPUT"
            echo "${{ env.API_IMAGE }}:latest" >> "$GITHUB_OUTPUT"
            echo "${{ env.API_IMAGE }}:${branch_name}-latest" >> "$GITHUB_OUTPUT"
            echo "${{ env.API_IMAGE }}:${{ steps.image.outputs.image_tag }}" >> "$GITHUB_OUTPUT"
            echo "EOF" >> "$GITHUB_OUTPUT"

            echo "ui_tags<<EOF" >> "$GITHUB_OUTPUT"
            echo "${{ env.UI_IMAGE }}:latest" >> "$GITHUB_OUTPUT"
            echo "${{ env.UI_IMAGE }}:${branch_name}-latest" >> "$GITHUB_OUTPUT"
            echo "${{ env.UI_IMAGE }}:${{ steps.image.outputs.image_tag }}" >> "$GITHUB_OUTPUT"
            echo "EOF" >> "$GITHUB_OUTPUT"
          else
            echo "api_tags<<EOF" >> "$GITHUB_OUTPUT"
            echo "${{ env.API_IMAGE }}:${branch_name}-latest" >> "$GITHUB_OUTPUT"
            echo "${{ env.API_IMAGE }}:${{ steps.image.outputs.image_tag }}" >> "$GITHUB_OUTPUT"
            echo "EOF" >> "$GITHUB_OUTPUT"

            echo "ui_tags<<EOF" >> "$GITHUB_OUTPUT"
            echo "${{ env.UI_IMAGE }}:${branch_name}-latest" >> "$GITHUB_OUTPUT"
            echo "${{ env.UI_IMAGE }}:${{ steps.image.outputs.image_tag }}" >> "$GITHUB_OUTPUT"
            echo "EOF" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: src/Cashflowpoly.Api/Dockerfile
          push: true
          tags: ${{ steps.tags.outputs.api_tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push UI image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: src/Cashflowpoly.Ui/Dockerfile
          push: true
          tags: ${{ steps.tags.outputs.ui_tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
