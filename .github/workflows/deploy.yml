# Fungsi file: Mendefinisikan pipeline deploy otomatis ke branch/environment dev dan prod.
name: Deploy - Dev & Prod

on:
  workflow_run:
    workflows: ["CD - Build & Push Images"]
    types: [completed]
    branches: [dev, prod]
  workflow_dispatch:
    inputs:
      target_branch:
        description: Branch target deploy
        required: true
        type: choice
        options:
          - dev
          - prod
      image_tag:
        description: Tag image untuk deploy manual (opsional)
        required: false
        type: string

jobs:
  deploy-dev:
    name: Deploy dev
    runs-on: ubuntu-latest
    if: >-
      (github.event_name == 'workflow_run' &&
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'dev') ||
      (github.event_name == 'workflow_dispatch' &&
      inputs.target_branch == 'dev')
    environment: dev
    permissions:
      contents: read

    steps:
      - name: Resolve deploy metadata
        id: meta
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            echo "branch=dev" >> "$GITHUB_OUTPUT"
            echo "image_tag=${{ github.event.workflow_run.head_sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "branch=dev" >> "$GITHUB_OUTPUT"
            if [ -n "${{ inputs.image_tag }}" ]; then
              echo "image_tag=${{ inputs.image_tag }}" >> "$GITHUB_OUTPUT"
            else
              echo "image_tag=dev-latest" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Deploy ke server dev via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script_stop: true
          script: |
            set -euo pipefail
            cd "${{ secrets.DEPLOY_PATH }}"
            git fetch origin
            git checkout "${{ steps.meta.outputs.branch }}"
            git pull --ff-only origin "${{ steps.meta.outputs.branch }}"
            chmod +x deploy.sh
            export IMAGE_TAG="${{ steps.meta.outputs.image_tag }}"
            ./deploy.sh --dev

  deploy-prod:
    name: Deploy prod
    runs-on: ubuntu-latest
    if: >-
      (github.event_name == 'workflow_run' &&
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'prod') ||
      (github.event_name == 'workflow_dispatch' &&
      inputs.target_branch == 'prod')
    environment: prod
    permissions:
      contents: read

    steps:
      - name: Resolve deploy metadata
        id: meta
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            echo "branch=prod" >> "$GITHUB_OUTPUT"
            echo "image_tag=${{ github.event.workflow_run.head_sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "branch=prod" >> "$GITHUB_OUTPUT"
            if [ -n "${{ inputs.image_tag }}" ]; then
              echo "image_tag=${{ inputs.image_tag }}" >> "$GITHUB_OUTPUT"
            else
              echo "image_tag=prod-latest" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Deploy ke server prod via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script_stop: true
          script: |
            set -euo pipefail
            cd "${{ secrets.DEPLOY_PATH }}"
            git fetch origin
            git checkout "${{ steps.meta.outputs.branch }}"
            git pull --ff-only origin "${{ steps.meta.outputs.branch }}"
            chmod +x deploy.sh
            export IMAGE_TAG="${{ steps.meta.outputs.image_tag }}"
            ./deploy.sh
